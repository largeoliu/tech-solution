version: 1
blocks:
  WD-CTX:
    type: singleton
    heading: WD-CTX
    input_schema:
      type: array
      item_schema: ctx_entry
      required_fields:
        - id
        - source
        - conclusion
        - applicable_slots
        - confidence
      optional_fields:
        - asset_type       # 资产类型
        - asset_id         # 资产标识
        - location         # 位置
        - current_duty     # 当前职责
        - current_capability  # 当前能力
        - extensibility    # 可扩展点
        - known_limits     # 已知限制
        - callers_deps     # 调用方/依赖方
        - evidence_path    # 相关证据路径
        - search_scope     # 搜索范围（未发现候选时）
        - search_keywords  # 搜索关键词（未发现候选时）
        - excluded         # 已排除目录或对象（未发现候选时）
        - not_found_conclusion  # 未发现结论（未发现候选时）
  WD-TASK:
    type: singleton
    heading: WD-TASK
    input_schema:
      type: array
      item_schema: slot_task
      required_fields:
        - slot              # label: 槽位标识
        - required_ctx      # label: 必须消费的共享上下文
        - participating_experts  # label: 参与专家
        - expert_questions  # label: 每位专家必答问题
        - suggested_slot    # label: 建议落位槽位
        - expression_requirements  # label: 落位表达要求
        - blockers          # label: 缺口或阻塞项
  WD-EXP-SLOT:
    type: pattern
    heading_pattern: WD-EXP-SLOT-\d+
    input_schema:
      type: array
      item_schema: slot_analysis
      required_fields:
        - slot
        - decision_type
        - rationale
        - evidence_refs
        - open_questions
    required_sections:
      - 参与槽位
      - 决策类型
      - 核心理由
      - 关键证据引用
      - 未决点
  WD-SYN-SLOT:
    type: pattern
    heading_pattern: WD-SYN-SLOT-\d+
    input_schema:
      type: array
      item_schema: slot_synthesis
      required_fields:
        - slot
        - target_capability
        - comparisons
        - selected_path
        - selected_writeup
        - evidence_refs
        - template_gap
        - open_question
