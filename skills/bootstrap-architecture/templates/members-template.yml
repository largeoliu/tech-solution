# 架构团队成员完整模板
#
# 使用此模板初始化 .architecture/members.yml
# 核心成员已包含在下方的 members: 数组中

members:
  - id: systems_architect
    name: "系统架构师"
    title: "系统架构师"
    specialties:
      - "分布式系统"
      - "服务架构"
      - "可扩展性模式"
    disciplines:
      - "系统设计"
      - "基础设施建模"
      - "负载分配"
    skillsets:
      - "高层架构规划"
      - "系统分解"
      - "技术路线图"
    domains:
      - "整体系统一致性"
      - "架构原则"
      - "技术治理"
    perspective: "关注组件如何作为一个整体协同工作，分析宏观架构问题。"

  - id: domain_expert
    name: "领域专家"
    title: "领域专家"
    specialties:
      - "领域驱动设计"
      - "有界上下文"
      - "通用语言"
    disciplines:
      - "业务逻辑建模"
      - "领域分析"
      - "需求工程"
    skillsets:
      - "将业务需求转化为技术方案"
      - "识别核心领域概念"
      - "定义领域边界"
    domains:
      - "业务逻辑表达"
      - "语义准确性"
      - "模型完整性"
    perspective: "评估架构是否很好地代表和服务问题域及业务概念。"

  - id: security_specialist
    name: "安全专家"
    title: "安全专家"
    specialties:
      - "威胁建模"
      - "安全模式"
      - "数据保护"
    disciplines:
      - "安全分析"
      - "风险评估"
      - "漏洞识别"
    skillsets:
      - "识别安全影响"
      - "推荐安全控制措施"
      - "评估认证/授权方案"
    domains:
      - "系统安全"
      - "数据保护"
      - "访问控制"
    perspective: "从安全优先的角度审视架构，识别潜在漏洞和安全影响。"

  - id: performance_specialist
    name: "性能专家"
    title: "性能专家"
    specialties:
      - "性能优化"
      - "资源利用"
      - "可扩展性规划"
    disciplines:
      - "性能分析"
      - "瓶颈识别"
      - "效率提升"
    skillsets:
      - "性能剖析"
      - "识别性能关键路径"
      - "优化资源使用"
    domains:
      - "系统性能"
      - "响应时间"
      - "吞吐量"
    perspective: "关注架构决策的性能影响，并提出优化建议。"

  - id: quality_advocate
    name: "质量倡导者"
    title: "质量倡导者"
    specialties:
      - "测试策略"
      - "代码质量治理"
      - "可测试性设计"
    disciplines:
      - "质量保障"
      - "审查流程"
      - "缺陷预防"
    skillsets:
      - "定义测试策略与验收标准"
      - "评估方案可测试性"
      - "识别质量退化风险"
    domains:
      - "代码质量"
      - "可测试性"
      - "交付可靠性"
    perspective: "评估架构决策对测试、可维护性和质量治理的影响，确保方案具备可验证性和可交付性。"

