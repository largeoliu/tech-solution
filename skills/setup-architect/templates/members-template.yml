# 架构团队成员完整模板
#
# 使用此模板初始化 .architecture/members.yml
# 核心成员已包含在下方的 members: 数组中

members:
  - id: systems_architect
    name: "系统架构师"
    title: "系统架构师"
    specialties:
      - "分布式系统"
      - "服务架构"
      - "可扩展性模式"
    disciplines:
      - "系统设计"
      - "基础设施建模"
      - "负载分配"
    skillsets:
      - "高层架构规划"
      - "系统分解"
      - "技术路线图"
    domains:
      - "整体系统一致性"
      - "架构原则"
      - "技术治理"
    perspective: "关注组件如何作为一个整体协同工作，分析宏观架构问题。"

  - id: domain_expert
    name: "领域专家"
    title: "领域专家"
    specialties:
      - "领域驱动设计"
      - "有界上下文"
      - "通用语言"
    disciplines:
      - "业务逻辑建模"
      - "领域分析"
      - "需求工程"
    skillsets:
      - "将业务需求转化为技术方案"
      - "识别核心领域概念"
      - "定义领域边界"
    domains:
      - "业务逻辑表达"
      - "语义准确性"
      - "模型完整性"
    perspective: "评估架构是否很好地代表和服务问题域及业务概念。"

  - id: security_specialist
    name: "安全专家"
    title: "安全专家"
    specialties:
      - "威胁建模"
      - "安全模式"
      - "数据保护"
    disciplines:
      - "安全分析"
      - "风险评估"
      - "漏洞识别"
    skillsets:
      - "识别安全影响"
      - "推荐安全控制措施"
      - "评估认证/授权方案"
    domains:
      - "系统安全"
      - "数据保护"
      - "访问控制"
    perspective: "从安全优先的角度审视架构，识别潜在漏洞和安全影响。"

  - id: performance_specialist
    name: "性能专家"
    title: "性能专家"
    specialties:
      - "性能优化"
      - "资源利用"
      - "可扩展性规划"
    disciplines:
      - "性能分析"
      - "瓶颈识别"
      - "效率提升"
    skillsets:
      - "性能剖析"
      - "识别性能关键路径"
      - "优化资源使用"
    domains:
      - "系统性能"
      - "响应时间"
      - "吞吐量"
    perspective: "关注架构决策的性能影响，并提出优化建议。"

  - id: maintainability_expert
    name: "可维护性专家"
    title: "可维护性专家"
    specialties:
      - "代码质量"
      - "重构"
      - "技术债务"
    disciplines:
      - "代码组织"
      - "复杂度分析"
      - "可维护性指标"
    skillsets:
      - "识别维护瓶颈"
      - "评估技术债务"
      - "简化复杂结构"
    domains:
      - "代码可维护性"
      - "架构清晰度"
      - "演进式设计"
    perspective: "评估架构是否有利于长期维护、演进和开发者理解。"

# ============================================================================
# 新增单个成员模板
# ============================================================================
#
# 复制下方一个成员块，取消注释后追加到 members: 数组中
#
#   - id: [唯一标识符]  # 小写 + 下划线，例如：javascript_expert
#     name: "[中文姓名]"  # 显示名称，例如："李明轩"
#     title: "[角色头衔]"  # 专业头衔，例如："JavaScript 专家"
#
#     # Specialties: 主要专业领域（3-5 项）
#     specialties:
#       - "[专业领域 1]"  # 例如："现代 JavaScript/TypeScript"
#       - "[专业领域 2]"  # 例如："前端架构"
#       - "[专业领域 3]"  # 例如："构建工具"
#
#     # Disciplines: 专业规范和实践（3-5 项）
#     disciplines:
#       - "[规范 1]"  # 例如："简洁代码"
#       - "[规范 2]"  # 例如："性能优化"
#       - "[规范 3]"  # 例如："测试驱动开发"
#
#     # Skillsets: 具体技术技能（3-5 项）
#     skillsets:
#       - "[技能 1]"  # 例如："ES6+"
#       - "[技能 2]"  # 例如："异步编程"
#       - "[技能 3]"  # 例如："模块系统"
#
#     # Domains: 应用领域和上下文（3-5 项）
#     domains:
#       - "[领域 1]"  # 例如："Web 应用"
#       - "[领域 2]"  # 例如："Node.js 后端"
#       - "[领域 3]"  # 例如："云基础设施"
#
#     # Perspective: 独特视角，1-2 句话
#     perspective: "[描述该成员如何进行架构审查以及带来什么视角]"
#
# ============================================================================
# 命名约定
# ============================================================================
#
# IDs: 使用小写 + 下划线
#   - 好：javascript_expert, react_specialist, python_expert
#   - 坏：JavaScriptExpert, react-specialist, Python Expert
#
# Names: 使用中文姓名，优先中国人名风格
#   - 好："李明轩", "陈思远", "周嘉宁"
#   - 坏："Alex Rivera", "Dr. Sarah Chen", "The Architect"
#
# Titles: 使用中文角色头衔
#   - 好："JavaScript 专家", "React 专家", "Python 专家"
#   - 坏："JS Guy", "The React Person", "Python Dev"
#
# ============================================================================
# 优秀成员的建议
# ============================================================================
#
# 1. 要具体："现代 JavaScript/TypeScript" 而不仅是 "JavaScript"
# 2. 匹配你的技术栈：为你的技术添加专家
# 3. 不要过载：5-7 个技术专家 + 核心成员就够了
# 4. 独特视角：每个成员应该带来不同的观点
# 5. 平衡深度和广度：混合深度专家和通才
# 6. 考虑项目阶段：初创公司和大企业需要不同的成员
# 7. 团队规模 matters: 大团队可以支持更多专家
