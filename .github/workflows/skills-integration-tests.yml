name: Skills Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  skills-layout-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - assistant: claude
            target: .claude/skills
          - assistant: qoder
            target: .qoder/skills
          - assistant: lingma
            target: .lingma/skills
          - assistant: trae
            target: .trae/skills
          - assistant: generic
            target: .agents/skills

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare local git source
        run: |
          git clone --bare . "$RUNNER_TEMP/ai-software-architect.git"
          sha="$(git rev-parse HEAD)"
          git --git-dir="$RUNNER_TEMP/ai-software-architect.git" update-ref refs/heads/main "$sha"
          git --git-dir="$RUNNER_TEMP/ai-software-architect.git" symbolic-ref HEAD refs/heads/main

      - name: Create test project
        run: |
          mkdir -p "test-projects/${{ matrix.assistant }}"
          cd "test-projects/${{ matrix.assistant }}"
          printf '# Skill-only test project\n' > README.md

      - name: Bootstrap skills into assistant-specific target
        run: |
          cd "test-projects/${{ matrix.assistant }}"
          mkdir -p "${{ matrix.target }}"
          git clone "$RUNNER_TEMP/ai-software-architect.git" ./ai-architect-tmp
          cp -r ./ai-architect-tmp/skills/* "${{ matrix.target }}/"
          rm -rf ./ai-architect-tmp

      - name: Run one-pass project initialization
        run: |
          cd "test-projects/${{ matrix.assistant }}"
          skill_root="${{ matrix.target }}/setup-architect"
          mkdir -p .architecture/technical-solutions
          mkdir -p .architecture/templates

          test -f .architecture/templates/technical-solution-template.md || cp "$skill_root/templates/technical-solution-template.md" .architecture/templates/technical-solution-template.md
          test -f .architecture/members.yml || cp "$skill_root/templates/members-template.yml" .architecture/members.yml
          test -f .architecture/principles.md || cp "$skill_root/templates/principles-template.md" .architecture/principles.md

      - name: Verify directory routing and installation invariants
        run: |
          cd "test-projects/${{ matrix.assistant }}"

          [ -d ".architecture" ] || (echo "Missing .architecture" && exit 1)
          [ -d ".architecture/technical-solutions" ] || (echo "Missing .architecture/technical-solutions" && exit 1)
          [ -d ".architecture/templates" ] || (echo "Missing .architecture/templates" && exit 1)
          [ -f ".architecture/templates/technical-solution-template.md" ] || (echo "Missing technical solution template" && exit 1)
          [ -f ".architecture/members.yml" ] || (echo "Missing members.yml" && exit 1)
          [ -f ".architecture/principles.md" ] || (echo "Missing principles.md" && exit 1)
          [ ! -d "./ai-architect-tmp" ] || (echo "Temporary install directory should not exist" && exit 1)
          [ ! -d ".architecture/.architecture" ] || (echo "Nested .architecture should not exist" && exit 1)
          [ ! -d ".architecture/agent_docs" ] || (echo "agent_docs should not be installed" && exit 1)
          [ ! -f "CLAUDE.md" ] || (echo "CLAUDE.md must not be generated" && exit 1)
          [ ! -d ".architecture/solutions" ] || (echo "Legacy .architecture/solutions should not exist" && exit 1)
          [ ! -d ".architecture/plans" ] || (echo "Legacy .architecture/plans should not exist" && exit 1)
          [ ! -d ".architecture/reviews" ] || (echo "Legacy .architecture/reviews should not exist" && exit 1)
          [ ! -f ".architecture/config.yml" ] || (echo "Legacy .architecture/config.yml should not exist" && exit 1)
          [ ! -f ".architecture/templates/review-template.md" ] || (echo "Legacy review template should not exist" && exit 1)
          [ ! -f ".architecture/templates/implementation-plan-template.md" ] || (echo "Legacy implementation plan template should not exist" && exit 1)
          [ ! -f ".architecture/reviews/initial-system-analysis.md" ] || (echo "Legacy initial system analysis should not exist" && exit 1)

          for candidate in .claude/skills .qoder/skills .lingma/skills .trae/skills .agents/skills; do
            if [ "$candidate" = "${{ matrix.target }}" ]; then
              [ -d "$candidate" ] || (echo "Missing $candidate" && exit 1)
              [ ! -L "$candidate" ] || (echo "$candidate must not be symlink" && exit 1)
              [ ! -d "$candidate/.git" ] || (echo "Nested .git should be cleaned from $candidate" && exit 1)
            else
              [ ! -d "$candidate" ] || (echo "$candidate should not exist" && exit 1)
            fi
          done

      - name: Verify installed skill set and setup-architect resources
        run: |
          cd "test-projects/${{ matrix.assistant }}"
          target="${{ matrix.target }}"
          repo_root="$(git rev-parse --show-toplevel)"

          expected_skills="$(mktemp)"
          actual_skills="$(mktemp)"

          for skill_dir in "$repo_root"/skills/*; do
            [ -d "$skill_dir" ] || continue
            skill_name="$(basename "$skill_dir")"
            printf '%s\n' "$skill_name" >> "$expected_skills"
            [ -f "$target/$skill_name/SKILL.md" ] || (echo "Missing $skill_name/SKILL.md" && exit 1)
          done

          sort -o "$expected_skills" "$expected_skills"
          find "$target" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort > "$actual_skills"

          diff -u "$expected_skills" "$actual_skills" || (echo "Installed skill list mismatch for $target" && exit 1)

          [ -f "$target/setup-architect/SKILL.md" ] || (echo "Missing setup-architect/SKILL.md" && exit 1)
          [ -f "$target/setup-architect/references/installation-procedures.md" ] || (echo "Missing installation-procedures.md" && exit 1)
          [ -f "$target/setup-architect/references/member-customization.md" ] || (echo "Missing member-customization.md" && exit 1)
          [ -f "$target/setup-architect/references/principles-customization.md" ] || (echo "Missing principles-customization.md" && exit 1)
          [ -f "$target/setup-architect/templates/technical-solution-template.md" ] || (echo "Missing technical-solution-template.md" && exit 1)
          [ -f "$target/setup-architect/templates/members-template.yml" ] || (echo "Missing members-template.yml" && exit 1)
          [ -f "$target/setup-architect/templates/principles-template.md" ] || (echo "Missing principles-template.md" && exit 1)

      - name: Run skill validation contract suite
        run: |
          python3 -m unittest discover -s tests/skill_validation -p "test_*.py" -v
